#/meshes/mesh-1/dataplanes/dp-1/_rules 200
type: Mesh
name: mesh-1
---
type: Dataplane
name: dp-1
mesh: mesh-1
labels:
  app: demo-app
networking:
  address: 127.0.0.1
  inbound:
    - port: 8080
      name: main-port
      tags:
        kuma.io/service: foo
    - port: 9090
      name: secondary-port
      tags:
        kuma.io/service: bar
---
type: MeshTimeout
name: select-whole-dpp
mesh: mesh-1
spec:
  targetRef:
    kind: Dataplane
    labels:
      app: demo-app
  rules:
    - default:
        idleTimeout: 7s
        connectionTimeout: 7s
        http:
          requestTimeout: 7s
---
type: MeshTimeout
name: select-single-inbound
mesh: mesh-1
spec:
  targetRef:
    kind: Dataplane
    labels:
      app: demo-app
    sectionName: secondary-port
  rules:
    - default:
        http:
          requestTimeout: 2s

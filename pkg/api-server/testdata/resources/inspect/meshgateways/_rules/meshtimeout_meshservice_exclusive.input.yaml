#/meshes/default/meshgateways/the-gateway/_rules 200
# Built-in gateway targeting was removed: a Mesh-scoped MeshTimeout no longer
# produces rules for a MeshGateway resource's built-in listeners (it has no
# inbounds), regardless of meshServices mode. This asserts that Exclusive
# mode doesn't resurrect that matching via the "to" MeshService targetRef.
type: Mesh
name: default
meshServices:
  mode: Exclusive
---
type: MeshGateway
name: the-gateway
mesh: default
labels:
  k8s.kuma.io/namespace: kuma-demo
  kuma.io/display-name: the-gateway
selectors:
  - match:
      kuma.io/service: gw-1
conf:
  listeners:
    - port: 8080
      protocol: HTTP
---
type: MeshTimeout
name: mt-on-gateway-exclusive
mesh: default
labels:
  k8s.kuma.io/namespace: kuma-demo
  kuma.io/display-name: mt-on-gateway-exclusive
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: MeshService
        labels:
          env: dev
      default:
        idleTimeout: 20s
        connectionTimeout: 2s
        http:
          requestTimeout: 10s
---
type: MeshService
name: backend-svc
mesh: default
labels:
  env: dev
spec:
  selector:
    dataplaneTags:
      app: backend
  ports:
    - port: 80
      targetPort: 80
      appProtocol: http

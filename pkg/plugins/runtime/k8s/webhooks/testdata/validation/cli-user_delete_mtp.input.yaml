# user=cli-user,operation=DELETE,namespace=kuma-system
apiVersion: kuma.io/v1alpha1
kind: MeshTrafficPermission
metadata:
  name: mtp-es
  labels:
    kuma.io/mesh: default
    kuma.io/policy-role: workload-owner
spec:
  targetRef:
    kind: MeshService
    name: backend
  rules:
    - default:
        allow:
          - spiffeID:
              type: Prefix
              value: spiffe://default/frontend

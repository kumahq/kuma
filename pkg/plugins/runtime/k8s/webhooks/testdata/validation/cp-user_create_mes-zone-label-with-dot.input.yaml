# user=system:serviceaccount:kuma-system:kuma-control-plane,operation=CREATE
apiVersion: kuma.io/v1alpha1
kind: MeshExternalService
metadata:
  name: ext-backend
  namespace: kuma-system
  labels:
    kuma.io/mesh: default
    kuma.io/zone: east.1
spec:
  match:
    type: HostnameGenerator
    port: 80
    protocol: http
  endpoints:
    - address: example.com
      port: 80

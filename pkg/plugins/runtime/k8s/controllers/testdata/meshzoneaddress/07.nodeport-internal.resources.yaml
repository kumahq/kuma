apiVersion: v1
kind: Namespace
metadata:
  name: kuma-system
---
apiVersion: v1
kind: Service
metadata:
  name: zone-ingress
  namespace: kuma-system
  labels:
    k8s.kuma.io/zone-proxy-type: ingress
spec:
  type: NodePort
  ports:
    - port: 10001
      nodePort: 30001
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: zone-ingress-abc
  namespace: kuma-system
  labels:
    kubernetes.io/service-name: zone-ingress
addressType: IPv4
endpoints:
  - addresses:
      - 10.0.0.1
    conditions:
      ready: true
---
apiVersion: v1
kind: Node
metadata:
  name: node-1
status:
  addresses:
    - type: InternalIP
      address: 192.168.1.1

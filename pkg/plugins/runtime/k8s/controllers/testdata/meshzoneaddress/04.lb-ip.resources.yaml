apiVersion: v1
kind: Namespace
metadata:
  name: kuma-system
---
apiVersion: v1
kind: Service
metadata:
  name: zone-ingress
  namespace: kuma-system
  labels:
    k8s.kuma.io/zone-proxy-type: ingress
spec:
  type: LoadBalancer
  ports:
    - port: 10001
status:
  loadBalancer:
    ingress:
      - ip: 5.6.7.8
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: zone-ingress-abc
  namespace: kuma-system
  labels:
    kubernetes.io/service-name: zone-ingress
addressType: IPv4
endpoints:
  - addresses:
      - 10.0.0.1
    conditions:
      ready: true

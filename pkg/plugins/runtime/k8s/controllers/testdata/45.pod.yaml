metadata:
  namespace: demo
  name: demo-app
  labels:
    app: demo
    version: "0.1"
    kuma.io/sidecar-injection: enabled
spec:
  containers:
    - name: app-container
      ports:
        - containerPort: 8080
    - name: helper-container
      ports: []
    - name: kuma-sidecar
      ports:
        - containerPort: 9901

status:
  podIP: 192.168.0.1
  containerStatuses:
    - name: app-container
      ready: true
      started: true
    - name: helper-container
      ready: false
      started: false
    - name: kuma-sidecar
      ready: true
      started: true

metadata:
  namespace: demo
  name: example
  labels:
    app: example
    kuma.io/sidecar-injection: enabled
spec:
  containers:
    - ports:
        - containerPort: 8080
  serviceAccountName: example
status:
  podIP: 192.168.0.1
  containerStatuses:
    - name: app
      ready: true
      started: true
    - name: kuma-sidecar
      ready: true
      started: true

mesh: default
metadata:
  labels:
    app: zone-proxy-dual
    k8s.kuma.io/namespace: demo
    kuma.io/display-name: zone-proxy-dual
    kuma.io/mesh: default
    kuma.io/proxy-type: sidecar
  name: zone-proxy-dual
spec:
  networking:
    address: 192.168.0.1
    listeners:
    - address: 192.168.0.1
      name: zi-main
      port: 10001
      type: ZoneIngress
    - address: 192.168.0.1
      name: ze-main
      port: 10002
      type: ZoneEgress
    transparentProxying:
      reachableBackends: {}

resources:
- name: outbound:passthrough:ipv4
  resource:
    '@type': type.googleapis.com/envoy.config.listener.v3.Listener
    address:
      socketAddress:
        address: 0.0.0.0
        portValue: 15001
    filterChainMatcher:
      matcherTree:
        exactMatchMap:
          map:
            raw_buffer:
              matcher:
                matcherTree:
                  exactMatchMap:
                    map:
                      h2c:
                        matcher:
                          matcherTree:
                            exactMatchMap:
                              map:
                                "80":
                                  action:
                                    name: meshpassthrough_http_80
                                    typedConfig:
                                      '@type': type.googleapis.com/google.protobuf.StringValue
                                      value: meshpassthrough_http_80
                            input:
                              name: envoy.matching.inputs.destination_port
                              typedConfig:
                                '@type': type.googleapis.com/envoy.extensions.matching.common_inputs.network.v3.DestinationPortInput
                          onNoMatch:
                            action:
                              name: meshpassthrough_http_*
                              typedConfig:
                                '@type': type.googleapis.com/google.protobuf.StringValue
                                value: meshpassthrough_http_*
                      http/1.1:
                        matcher:
                          matcherTree:
                            exactMatchMap:
                              map:
                                "80":
                                  action:
                                    name: meshpassthrough_http_80
                                    typedConfig:
                                      '@type': type.googleapis.com/google.protobuf.StringValue
                                      value: meshpassthrough_http_80
                            input:
                              name: envoy.matching.inputs.destination_port
                              typedConfig:
                                '@type': type.googleapis.com/envoy.extensions.matching.common_inputs.network.v3.DestinationPortInput
                          onNoMatch:
                            action:
                              name: meshpassthrough_http_*
                              typedConfig:
                                '@type': type.googleapis.com/google.protobuf.StringValue
                                value: meshpassthrough_http_*
                  input:
                    name: envoy.matching.inputs.application_protocol
                    typedConfig:
                      '@type': type.googleapis.com/envoy.extensions.matching.common_inputs.network.v3.ApplicationProtocolInput
        input:
          name: envoy.matching.inputs.transport_protocol
          typedConfig:
            '@type': type.googleapis.com/envoy.extensions.matching.common_inputs.network.v3.TransportProtocolInput
    filterChains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          httpFilters:
          - name: envoy.filters.http.router
            typedConfig:
              '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          internalAddressConfig:
            cidrRanges:
            - addressPrefix: 127.0.0.1
              prefixLen: 32
          routeConfig:
            name: meshpassthrough_http_192.168.0.0_80
            virtualHosts:
            - domains:
              - '*'
              name: 192.168.0.0
              routes:
              - match:
                  prefix: /
                route:
                  cluster: meshpassthrough_http_192.168.0.0_80
          statPrefix: meshpassthrough_http_192_168_0_0_80
      name: meshpassthrough_http_192.168.0.0_80
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          httpFilters:
          - name: envoy.filters.http.router
            typedConfig:
              '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          internalAddressConfig:
            cidrRanges:
            - addressPrefix: 127.0.0.1
              prefixLen: 32
          routeConfig:
            name: meshpassthrough_http_192.168.0.0_*
            virtualHosts:
            - domains:
              - '*'
              name: 192.168.0.0
              routes:
              - match:
                  prefix: /
                route:
                  cluster: meshpassthrough_http_192.168.0.0_*
          statPrefix: meshpassthrough_http_192_168_0_0__
      name: meshpassthrough_http_192.168.0.0_*
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          httpFilters:
          - name: envoy.filters.http.router
            typedConfig:
              '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          internalAddressConfig:
            cidrRanges:
            - addressPrefix: 127.0.0.1
              prefixLen: 32
          routeConfig:
            name: meshpassthrough_http_192.168.0.0/24_80
            virtualHosts:
            - domains:
              - '*'
              name: 192.168.0.0/24
              routes:
              - match:
                  prefix: /
                route:
                  cluster: meshpassthrough_http_192.168.0.0/24_80
          statPrefix: meshpassthrough_http_192_168_0_0_24_80
      name: meshpassthrough_http_192.168.0.0/24_80
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          httpFilters:
          - name: envoy.filters.http.router
            typedConfig:
              '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          internalAddressConfig:
            cidrRanges:
            - addressPrefix: 127.0.0.1
              prefixLen: 32
          routeConfig:
            name: meshpassthrough_http_10.10.0.0/16_80
            virtualHosts:
            - domains:
              - '*'
              name: 10.10.0.0/16
              routes:
              - match:
                  prefix: /
                route:
                  cluster: meshpassthrough_http_10.10.0.0/16_80
          statPrefix: meshpassthrough_http_10_10_0_0_16_80
      name: meshpassthrough_http_10.10.0.0/16_80
    listenerFilters:
    - name: envoy.filters.listener.original_dst
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
    - name: envoy.filters.listener.tls_inspector
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
    - name: envoy.filters.listener.http_inspector
      typedConfig:
        '@type': type.googleapis.com/envoy.extensions.filters.listener.http_inspector.v3.HttpInspector
    name: outbound:passthrough:ipv4
    trafficDirection: OUTBOUND
- name: outbound:passthrough:ipv6
  resource:
    '@type': type.googleapis.com/envoy.config.listener.v3.Listener
    address:
      socketAddress:
        address: '::'
        portValue: 15001
    filterChains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          cluster: outbound:passthrough:ipv6
          statPrefix: outbound_passthrough_ipv6
    name: outbound:passthrough:ipv6
    trafficDirection: OUTBOUND

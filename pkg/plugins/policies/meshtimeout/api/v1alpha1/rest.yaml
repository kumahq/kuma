openapi: 3.1.0
info:
  version: v1alpha1
  title: Kuma API
  description: Kuma API
paths:
  /meshes/{mesh}/meshtimeouts/{name}:
    get:
      operationId: getMeshTimeout
      summary: Returns MeshTimeout entity
      tags: ["MeshTimeout"]
      parameters:
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
        - in: path
          name: name
          schema:
            type: string
          required: true
          description: name of the MeshTimeout
      responses:
        '200':
          $ref: "#/components/responses/MeshTimeoutItem"
        '404':
          $ref: "../../base/specs/common/error_schema.yaml#/components/responses/NotFound"
    put:
      operationId: putMeshTimeout
      summary: Creates or Updates MeshTimeout entity
      tags: ["MeshTimeout"]
      parameters:
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
        - in: path
          name: name
          schema:
            type: string
          required: true
          description: name of the MeshTimeout
      requestBody:
        description: Put request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeshTimeoutItem'
      responses:
        '200':
          $ref: '#/components/responses/MeshTimeoutCreateOrUpdateSuccessResponse'
        '201':
          $ref: '#/components/responses/MeshTimeoutCreateOrUpdateSuccessResponse'
    delete:
      operationId: deleteMeshTimeout
      summary: Deletes MeshTimeout entity
      tags: ["MeshTimeout"]
      parameters:
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
        - in: path
          name: name
          schema:
            type: string
          required: true
          description: name of the MeshTimeout
      responses:
        '200':
          $ref: '#/components/responses/MeshTimeoutDeleteSuccessResponse'
        '404':
          $ref: "../../base/specs/common/error_schema.yaml#/components/responses/NotFound"
  /meshes/{mesh}/meshtimeouts:
    get:
      operationId: getMeshTimeoutList
      summary: Returns a list of MeshTimeout in the mesh.
      tags: ["MeshTimeout"]
      parameters:
        - in: query
          name: offset
          description: offset in the list of entities
          required: false
          schema:
            type: integer
          example: 0
        - in: query
          name: size
          description: the number of items per page
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
            minimum: 1
        - in: query
          name: filter
          description: filter by labels when multiple filters are present, they are ANDed
          required: false
          schema:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
          example:
            label.k8s.kuma.io/namespace: my-ns
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
      responses:
        '200':
          $ref: "#/components/responses/MeshTimeoutList"
components:
  schemas:
    MeshTimeoutItem:
      type: object
      description: "MeshTimeout configures timeout limits for service-to-service communication to prevent requests from hanging indefinitely. It supports connection timeouts, idle timeouts, and HTTP-specific timeouts (request, stream, headers) to ensure timely failure detection and improve service responsiveness."
      required: [type, name, spec]
      properties:
        type:
          description: 'the type of the resource'
          type: string
          enum:
            - MeshTimeout
        mesh:
          description: 'Mesh is the name of the Kuma mesh this resource belongs to. It may be omitted for cluster-scoped resources.'
          type: string
          default: default
        kri:
          description: 'A unique identifier for this resource instance used by internal tooling and integrations. Typically derived from resource attributes and may be used for cross-references or indexing'
          type: string
          readOnly: true
          example: 'kri_mt_default_zone-east_kuma-demo_mypolicy1_'
        name:
          description: 'Name of the Kuma resource'
          type: string
        labels:
          additionalProperties:
            type: string
          description: 'The labels to help identity resources'
          type: object
        spec:
          description: Spec is the specification of the Kuma MeshTimeout resource.
          properties:
            rules:
              description: |-
                Rules defines inbound timeout configurations. When matches are present, the rule is applied only
                to traffic selected by the given source and destination matchers.
              items:
                properties:
                  default:
                    description: Default contains configuration of the inbound timeouts
                    properties:
                      connectionTimeout:
                        description: |-
                          ConnectionTimeout specifies the amount of time proxy will wait for an TCP connection to be established.
                          Default value is 5 seconds. Cannot be set to 0.
                        type: string
                      http:
                        description: Http provides configuration for HTTP specific timeouts
                        properties:
                          maxConnectionDuration:
                            description: |-
                              MaxConnectionDuration is the time after which a connection will be drained and/or closed,
                              starting from when it was first established. Setting this timeout to 0 will disable it.
                              Disabled by default.
                            type: string
                          maxStreamDuration:
                            description: |-
                              MaxStreamDuration is the maximum time that a stream’s lifetime will span.
                              Setting this timeout to 0 will disable it. Disabled by default.
                            type: string
                          requestHeadersTimeout:
                            description: |-
                              RequestHeadersTimeout The amount of time that proxy will wait for the request headers to be received. The timer is
                              activated when the first byte of the headers is received, and is disarmed when the last byte of
                              the headers has been received. If not specified or set to 0, this timeout is disabled.
                              Disabled by default.
                            type: string
                          requestTimeout:
                            description: |-
                              RequestTimeout The amount of time that proxy will wait for the entire request to be received.
                              The timer is activated when the request is initiated, and is disarmed when the last byte of the request is sent,
                              OR when the response is initiated. Setting this timeout to 0 will disable it.
                              Default is 15s.
                            type: string
                          streamIdleTimeout:
                            description: |-
                              StreamIdleTimeout is the amount of time that proxy will allow a stream to exist with no activity.
                              Setting this timeout to 0 will disable it. Default is 30m
                            type: string
                        type: object
                      idleTimeout:
                        description: |-
                          IdleTimeout is defined as the period in which there are no bytes sent or received on connection
                          Setting this timeout to 0 will disable it. Be cautious when disabling it because
                          it can lead to connection leaking. Default value is 1h.
                        type: string
                    type: object
                  matches:
                    description: Matches define predicates for selecting traffic this configuration applies to.
                    items:
                      properties:
                        sni:
                          description: SNI defines a matcher configuration for matching by SNI value carried on the TLS connection
                          properties:
                            type:
                              description: Type defines how to match traffic by SNI. Only `Exact` is supported.
                              enum:
                                - Exact
                              type: string
                            value:
                              description: Value is the SNI carried on the TLS connection that needs to match for the configuration to be applied
                              type: string
                          required:
                            - type
                            - value
                          type: object
                        spiffeID:
                          description: SpiffeID defines a matcher configuration for SpiffeID matching
                          properties:
                            type:
                              description: Type defines how to match incoming traffic by SpiffeID. `Exact` or `Prefix` are allowed.
                              enum:
                                - Exact
                                - Prefix
                              type: string
                            value:
                              description: Value is SpiffeID of a client that needs to match for the configuration to be applied
                              type: string
                          required:
                            - type
                            - value
                          type: object
                      type: object
                    type: array
                type: object
              type: array
            targetRef:
              description: |-
                TargetRef is a reference to the resource the policy takes an effect on.
                The resource could be either a real store object or virtual resource
                defined inplace.
              properties:
                kind:
                  description: Kind of the referenced resource
                  enum:
                    - Mesh
                    - Dataplane
                  type: string
                labels:
                  additionalProperties:
                    type: string
                  description: |-
                    Labels are used to select group of MeshServices that match labels. Either Labels or
                    Name and Namespace can be used.
                  type: object
                mesh:
                  description: Mesh is reserved for future use to identify cross mesh resources.
                  type: string
                name:
                  description: Name of the referenced resource. Can only be used with kind `Dataplane`.
                  type: string
                namespace:
                  description: |-
                    Namespace specifies the namespace of target resource. If empty only resources in policy namespace
                    will be targeted.
                  type: string
                proxyTypes:
                  description: |-
                    ProxyTypes specifies the data plane types that are subject to the policy. When not specified,
                    all data plane types are targeted by the policy.
                  items:
                    enum:
                      - Sidecar
                      - Gateway
                    type: string
                  type: array
                sectionName:
                  description: |-
                    SectionName is used to target specific section of resource.
                    For example, you can target port from MeshService.ports[] by its name. Only traffic to this port will be affected.
                  type: string
                tags:
                  additionalProperties:
                    type: string
                  description: |-
                    Tags used to select a subset of proxies by tags. Not applicable to the
                    kinds supported by this field (`Mesh`, `Dataplane`).
                  type: object
              required:
                - kind
              type: object
            to:
              description: To list makes a match between the consumed services and corresponding configurations
              items:
                properties:
                  default:
                    description: |-
                      Default is a configuration specific to the group of destinations referenced in
                      'targetRef'
                    properties:
                      connectionTimeout:
                        description: |-
                          ConnectionTimeout specifies the amount of time proxy will wait for an TCP connection to be established.
                          Default value is 5 seconds. Cannot be set to 0.
                        type: string
                      http:
                        description: Http provides configuration for HTTP specific timeouts
                        properties:
                          maxConnectionDuration:
                            description: |-
                              MaxConnectionDuration is the time after which a connection will be drained and/or closed,
                              starting from when it was first established. Setting this timeout to 0 will disable it.
                              Disabled by default.
                            type: string
                          maxStreamDuration:
                            description: |-
                              MaxStreamDuration is the maximum time that a stream’s lifetime will span.
                              Setting this timeout to 0 will disable it. Disabled by default.
                            type: string
                          requestHeadersTimeout:
                            description: |-
                              RequestHeadersTimeout The amount of time that proxy will wait for the request headers to be received. The timer is
                              activated when the first byte of the headers is received, and is disarmed when the last byte of
                              the headers has been received. If not specified or set to 0, this timeout is disabled.
                              Disabled by default.
                            type: string
                          requestTimeout:
                            description: |-
                              RequestTimeout The amount of time that proxy will wait for the entire request to be received.
                              The timer is activated when the request is initiated, and is disarmed when the last byte of the request is sent,
                              OR when the response is initiated. Setting this timeout to 0 will disable it.
                              Default is 15s.
                            type: string
                          streamIdleTimeout:
                            description: |-
                              StreamIdleTimeout is the amount of time that proxy will allow a stream to exist with no activity.
                              Setting this timeout to 0 will disable it. Default is 30m
                            type: string
                        type: object
                      idleTimeout:
                        description: |-
                          IdleTimeout is defined as the period in which there are no bytes sent or received on connection
                          Setting this timeout to 0 will disable it. Be cautious when disabling it because
                          it can lead to connection leaking. Default value is 1h.
                        type: string
                    type: object
                  targetRef:
                    description: |-
                      TargetRef is a reference to the resource that represents a group of
                      destinations.
                    properties:
                      kind:
                        description: Kind of the referenced resource
                        enum:
                          - Mesh
                          - MeshService
                          - MeshExternalService
                          - MeshMultiZoneService
                          - MeshHTTPRoute
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels are used to select group of MeshServices that match labels. Either Labels or
                          Name and Namespace can be used.
                        type: object
                      mesh:
                        description: Mesh is reserved for future use to identify cross mesh resources.
                        type: string
                      name:
                        description: |-
                          Name of the referenced resource. Can only be used with kinds: `MeshService`,
                          `MeshExternalService`, `MeshMultiZoneService`, and `MeshHTTPRoute`.
                        type: string
                      namespace:
                        description: |-
                          Namespace specifies the namespace of target resource. If empty only resources in policy namespace
                          will be targeted.
                        type: string
                      proxyTypes:
                        description: |-
                          ProxyTypes specifies the data plane types that are subject to the policy. When not specified,
                          all data plane types are targeted by the policy.
                        items:
                          enum:
                            - Sidecar
                            - Gateway
                          type: string
                        type: array
                      sectionName:
                        description: |-
                          SectionName is used to target specific section of resource.
                          For example, you can target port from MeshService.ports[] by its name. Only traffic to this port will be affected.
                        type: string
                      tags:
                        additionalProperties:
                          type: string
                        description: |-
                          Tags used to select a subset of proxies by tags. Not applicable to the
                          kinds supported by this field.
                        type: object
                    required:
                      - kind
                    type: object
                required:
                  - targetRef
                type: object
              type: array
          type: object
        creationTime:
          readOnly: true
          type: string
          description: 'Time at which the resource was created'
          format: date-time
          example: '0001-01-01T00:00:00Z'
        modificationTime:
          readOnly: true
          type: string
          description: 'Time at which the resource was updated'
          format: date-time
          example: '0001-01-01T00:00:00Z'
  responses:
    MeshTimeoutItem:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MeshTimeoutItem'
    MeshTimeoutList:
      description: List
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  $ref: "#/components/schemas/MeshTimeoutItem"
              total:
                type: number
                description: The total number of entities
              next:
                type: string
                description: URL to the next page
    MeshTimeoutCreateOrUpdateSuccessResponse:
      description: Successful response
      content:
        application/json:
          schema:
            type: object
            properties:
              warnings:
                type: array
                readOnly: true
                description: |
                  warnings is a list of warning messages to return to the requesting Kuma API clients.
                  Warning messages describe a problem the client making the API request should correct or be aware of.
                items:
                  type: string
    MeshTimeoutDeleteSuccessResponse:
      description: Successful response
      content:
        application/json:
          schema:
            type: object

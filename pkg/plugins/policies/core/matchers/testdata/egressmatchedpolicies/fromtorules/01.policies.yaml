type: MeshCircuitBreaker
mesh: mesh-1
name: mcb-1
spec:
  targetRef:
    kind: Dataplane
    labels:
      kuma.io/service: external-database
      version: v1
  from:
    - targetRef:
        kind: Mesh
      default:
        connectionLimits:
          maxConnections: 33
  to:
    - targetRef:
        kind: MeshService
        name: backend
      default:
        connectionLimits:
          maxConnections: 77
---
type: MeshCircuitBreaker

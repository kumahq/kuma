type: MeshLoadBalancingStrategy
mesh: mesh-1
name: mlbs-1
spec:
  targetRef:
    kind: Dataplane
    labels:
      kuma.io/service: backend
  to:
    - targetRef:
        kind: MeshService
        name: external-database
      default:
        localityAwareness:
          disabled: true
---
type: MeshLoadBalancingStrategy
mesh: mesh-1
name: mlbs-2
spec:
  targetRef:
    kind: Dataplane
    labels:
      kuma.io/service: backend
      version: v2
  to:
    - targetRef:
        kind: MeshService
        name: external-database
      default:
        localityAwareness:
          disabled: false
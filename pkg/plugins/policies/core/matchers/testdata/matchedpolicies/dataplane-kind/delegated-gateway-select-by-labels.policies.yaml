# policies using kind Dataplane selecting delegated gateway by labels
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-1
spec:
  targetRef:
    kind: Dataplane
    labels:
      app: kong-gateway
  from:
    - targetRef:
        kind: Mesh
      default:
        action: Deny
---
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-2
spec:
  targetRef:
    kind: Dataplane
    labels:
      app: other
  from:
    - targetRef:
        kind: Mesh
      default:
        action: Allow

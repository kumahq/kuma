# policies using kind Dataplane selecting Dataplanes by name
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-1
labels:
  k8s.kuma.io/namespace: kuma-demo
spec:
  targetRef:
    kind: Dataplane
    name: dp-1
  rules:
    - default:
        deny:
          - spiffeID:
              type: Prefix
              value: spiffe://mesh-1
---
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-2
labels:
  k8s.kuma.io/namespace: kuma-demo
spec:
  targetRef:
    kind: Dataplane
    name: dp-2
  rules:
    - default:
        allow:
          - spiffeID:
              type: Prefix
              value: spiffe://mesh-1

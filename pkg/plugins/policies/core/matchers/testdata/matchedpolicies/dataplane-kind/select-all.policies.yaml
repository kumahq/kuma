# policies using kind Dataplane selecting all Dataplanes
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-1
spec:
  targetRef:
    kind: Dataplane
  rules:
    - default:
        deny:
          - spiffeID:
              type: Prefix
              value: spiffe://mesh-1
---
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-2
spec:
  targetRef:
    kind: Dataplane
  rules:
    - default:
        allow:
          - spiffeID:
              type: Prefix
              value: spiffe://mesh-1

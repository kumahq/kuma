# combining policies using kind Dataplane selecting Dataplanes by name and namespace and labels
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-1
labels:
  k8s.kuma.io/namespace: kuma-system
  kuma.io/policy-role: system
spec:
  targetRef:
    kind: Dataplane
    labels:
      app: demo
  rules:
    - default:
        deny:
          - spiffeID:
              type: Prefix
              value: spiffe://mesh-1
---
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-2
labels:
  k8s.kuma.io/namespace: kuma-system
  kuma.io/policy-role: system
spec:
  targetRef:
    kind: Dataplane
    name: dp-1
    namespace: kuma-demo
  rules:
    - default:
        allow:
          - spiffeID:
              type: Prefix
              value: spiffe://mesh-1
# 02. policies with the same levels select the dataplane
type: MeshTrafficPermission
mesh: mesh-1
name: aaa
spec:
  targetRef:
    kind: Dataplane
    labels:
      kuma.io/service: web
      version: v1
  rules:
    - default:
        allow:
          - spiffeID:
              type: Prefix
              value: spiffe://mesh-1

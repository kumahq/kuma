# 01. policies select the dataplane without collisions
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-1
spec:
  targetRef:
    kind: Dataplane
    labels:
      kuma.io/service: web
      version: v1
  from:
    - targetRef:
        kind: Mesh
      default:
        action: Allow

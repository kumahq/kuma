# 04. policy doesn't select dataplane if at least one tag is not presented
type: MeshTrafficPermission
mesh: mesh-1
name: mtp-1
spec:
  targetRef:
    kind: Dataplane
    labels:
      kuma.io/service: web
      version: v1
      env: dev
      team: mesh
  from:
    - targetRef:
        kind: Mesh
      default:
        action: Allow

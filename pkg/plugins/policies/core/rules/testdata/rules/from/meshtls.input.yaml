# MeshTLS With overrides
type: MeshTLS
name: default
mesh: default
spec:
  targetRef:
    kind: Mesh
  rules:
    - default:
        mode: Strict
---
type: MeshTLS
name: override
mesh: default
spec:
  targetRef:
    kind: Dataplane
    labels:
      kuma.io/service: foo
  rules:
    - default:
        mode: Permissive

# it should handle policies when some of them have 'rules', some have 'from' and IsFromAsRules is set to true
type: MeshTLS
name: matched-for-rules-mtls-aaaaaa
mesh: mesh-1
spec:
  rules:
    - default:
        mode: Strict
---
type: MeshTLS
name: matched-for-rules-mtls-bbbbbb
mesh: mesh-1
spec:
  from:
    - targetRef:
        kind: Mesh
      default:
        mode: Permissive
---
type: MeshTLS
name: matched-for-rules-mtls-cccccc
mesh: mesh-1
spec:
  rules:
    - default:
        mode: Strict

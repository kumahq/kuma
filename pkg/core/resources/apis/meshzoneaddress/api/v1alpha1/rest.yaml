openapi: 3.1.0
info:
  version: v1alpha1
  title: Kuma API
  description: Kuma API
paths:
  /meshes/{mesh}/meshzoneaddresses/{name}:
    get:
      operationId: getMeshZoneAddress
      summary: Returns MeshZoneAddress entity
      tags: ["MeshZoneAddress"]
      parameters:
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
        - in: path
          name: name
          schema:
            type: string
          required: true
          description: name of the MeshZoneAddress
      responses:
        '200':
          $ref: "#/components/responses/MeshZoneAddressItem"
        '404':
          $ref: "../../base/specs/common/error_schema.yaml#/components/responses/NotFound"
    put:
      operationId: putMeshZoneAddress
      summary: Creates or Updates MeshZoneAddress entity
      tags: ["MeshZoneAddress"]
      parameters:
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
        - in: path
          name: name
          schema:
            type: string
          required: true
          description: name of the MeshZoneAddress
      requestBody:
        description: Put request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeshZoneAddressItem'
      responses:
        '200':
          $ref: '#/components/responses/MeshZoneAddressCreateOrUpdateSuccessResponse'
        '201':
          $ref: '#/components/responses/MeshZoneAddressCreateOrUpdateSuccessResponse'
    delete:
      operationId: deleteMeshZoneAddress
      summary: Deletes MeshZoneAddress entity
      tags: ["MeshZoneAddress"]
      parameters:
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
        - in: path
          name: name
          schema:
            type: string
          required: true
          description: name of the MeshZoneAddress
      responses:
        '200':
          $ref: '#/components/responses/MeshZoneAddressDeleteSuccessResponse'
        '404':
          $ref: "../../base/specs/common/error_schema.yaml#/components/responses/NotFound"
  /meshes/{mesh}/meshzoneaddresses:
    get:
      operationId: getMeshZoneAddressList
      summary: Returns a list of MeshZoneAddress in the mesh.
      tags: ["MeshZoneAddress"]
      parameters:
        - in: query
          name: offset
          description: offset in the list of entities
          required: false
          schema:
            type: integer
          example: 0
        - in: query
          name: size
          description: the number of items per page
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
            minimum: 1
        - in: query
          name: filter
          description: filter by labels when multiple filters are present, they are ANDed
          required: false
          schema:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
          example:
            label.k8s.kuma.io/namespace: my-ns
        - in: path
          name: mesh
          schema:
            type: string
          required: true
          description: name of the mesh
      responses:
        '200':
          $ref: "#/components/responses/MeshZoneAddressList"
components:
  schemas:
    MeshZoneAddressItem:
      type: object
      description: "MeshZoneAddress holds the public address and port for a mesh-scoped zone ingress proxy."
      required: [type, name, spec]
      properties:
        type:
          description: 'the type of the resource'
          type: string
          enum:
            - MeshZoneAddress
        mesh:
          description: 'Mesh is the name of the Kuma mesh this resource belongs to. It may be omitted for cluster-scoped resources.'
          type: string
          default: default
        kri:
          description: 'A unique identifier for this resource instance used by internal tooling and integrations. Typically derived from resource attributes and may be used for cross-references or indexing'
          type: string
          readOnly: true
          example: 'kri_mza_default_zone-east_kuma-demo_myresource1_'
        name:
          description: 'Name of the Kuma resource'
          type: string
        labels:
          additionalProperties:
            type: string
          description: 'The labels to help identity resources'
          type: object
        spec:
          description: Spec is the specification of the Kuma MeshZoneAddress resource.
          properties:
            address:
              description: Address is the publicly reachable address of the zone ingress.
              minLength: 1
              type: string
            port:
              description: Port is the publicly reachable port of the zone ingress.
              format: int32
              maximum: 65535
              minimum: 1
              type: integer
          required:
            - address
            - port
          type: object
        creationTime:
          readOnly: true
          type: string
          description: 'Time at which the resource was created'
          format: date-time
          example: '0001-01-01T00:00:00Z'
        modificationTime:
          readOnly: true
          type: string
          description: 'Time at which the resource was updated'
          format: date-time
          example: '0001-01-01T00:00:00Z'
  responses:
    MeshZoneAddressItem:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MeshZoneAddressItem'
    MeshZoneAddressList:
      description: List
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  $ref: "#/components/schemas/MeshZoneAddressItem"
              total:
                type: number
                description: The total number of entities
              next:
                type: string
                description: URL to the next page
    MeshZoneAddressCreateOrUpdateSuccessResponse:
      description: Successful response
      content:
        application/json:
          schema:
            type: object
            properties:
              warnings:
                type: array
                readOnly: true
                description: |
                  warnings is a list of warning messages to return to the requesting Kuma API clients.
                  Warning messages describe a problem the client making the API request should correct or be aware of.
                items:
                  type: string
    MeshZoneAddressDeleteSuccessResponse:
      description: Successful response
      content:
        application/json:
          schema:
            type: object

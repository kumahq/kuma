{{- range $meshEntry := .Values.meshes }}
{{- $meshName := $meshEntry.name }}
{{- if not $meshName }}
{{- fail "each meshes entry must have a name" }}
{{- end }}

{{- /* Validate mutual exclusivity of combinedProxies vs ingress/egress */ -}}
{{- $ingressEnabled := and $meshEntry.ingress $meshEntry.ingress.enabled }}
{{- $egressEnabled := and $meshEntry.egress $meshEntry.egress.enabled }}
{{- $combinedEnabled := and $meshEntry.combinedProxies $meshEntry.combinedProxies.enabled }}
{{- if and $combinedEnabled (or $ingressEnabled $egressEnabled) }}
{{- fail (printf "meshes[%s]: combinedProxies is mutually exclusive with ingress and egress" $meshName) }}
{{- end }}

{{- /* Validate mode */ -}}
{{- if or (eq $.Values.controlPlane.mode "global") (eq $.Values.controlPlane.mode "standalone") }}
{{- fail (printf "meshes[%s]: mesh-scoped zone proxies require controlPlane.mode=zone" $meshName) }}
{{- end }}

{{- if $ingressEnabled }}
{{- $role := "ingress" }}
{{- $cfg := $meshEntry.ingress }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kuma.mesh.zoneproxy.name" (dict "root" $ "meshName" $meshName "role" $role) }}
  namespace: {{ $.Release.Namespace }}
  labels: {{ include "kuma.mesh.zoneproxy.labels" (dict "root" $ "meshName" $meshName "role" $role) | nindent 4 }}
spec:
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  {{- if not (and $cfg.hpa $cfg.hpa.enabled) }}
  replicas: {{ default 1 $cfg.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kuma.mesh.zoneproxy.selectorLabels" (dict "root" $ "meshName" $meshName "role" $role) | nindent 6 }}
  template:
    metadata:
      annotations:
        kuma.io/ingress: enabled
      labels:
        {{- include "kuma.mesh.zoneproxy.labels" (dict "root" $ "meshName" $meshName "role" $role) | nindent 8 }}
    spec:
      {{- with (and $cfg.podSpec $cfg.podSpec.affinity) }}
      affinity: {{ tpl (toYaml . | nindent 8) $ }}
      {{- end }}
      {{- with (and $cfg.podSpec $cfg.podSpec.topologySpreadConstraints) }}
      topologySpreadConstraints: {{ tpl (toYaml . | nindent 8) $ }}
      {{- end }}
      {{- with (and $cfg.podSpec $cfg.podSpec.priorityClassName) }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
      {{- if and $cfg.podSpec $cfg.podSpec.securityContext }}
      {{- toYaml $cfg.podSpec.securityContext | trim | nindent 8 }}
      {{- else }}
        runAsNonRoot: true
        runAsUser: 5678
        runAsGroup: 5678
      {{- end }}
      serviceAccountName: {{ include "kuma.mesh.zoneproxy.name" (dict "root" $ "meshName" $meshName "role" $role) }}
      automountServiceAccountToken: true
      restartPolicy: Always
      {{- with (and $cfg.podSpec $cfg.podSpec.nodeSelector) }}
      nodeSelector:
      {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with (and $cfg.podSpec $cfg.podSpec.tolerations) }}
      tolerations:
      {{ toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 40
      containers:
        - name: ingress
          image: {{ include "kuma.formatImage" (dict "image" $.Values.dataPlane.image "root" $) | quote }}
          imagePullPolicy: {{ $.Values.dataPlane.image.pullPolicy }}
          {{- if and $cfg.podSpec $cfg.podSpec.containerSecurityContext }}
          securityContext:
          {{- toYaml $cfg.podSpec.containerSecurityContext | trim | nindent 12 }}
          {{- else }}
          securityContext:
            readOnlyRootFilesystem: true
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUMA_CONTROL_PLANE_URL
              value: "https://{{ include "kuma.controlPlane.serviceName" $ }}.{{ $.Release.Namespace }}:5678"
            - name: KUMA_CONTROL_PLANE_CA_CERT_FILE
              value: /var/run/secrets/kuma.io/cp-ca/ca.crt
            - name: KUMA_DATAPLANE_DRAIN_TIME
              value: "30s"
            - name: KUMA_DATAPLANE_RUNTIME_TOKEN_PATH
              value: /var/run/secrets/kubernetes.io/serviceaccount/token
            - name: KUMA_DATAPLANE_PROXY_TYPE
              value: "ingress"
            - name: KUMA_DATAPLANE_MESH
              value: {{ $meshName | quote }}
          args:
            - run
            - --log-level=info
          ports:
            - containerPort: 10001
            - containerPort: 9901
          livenessProbe:
            httpGet:
              path: "/ready"
              port: 9901
            failureThreshold: 12
            initialDelaySeconds: 60
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: "/ready"
              port: 9901
            failureThreshold: 12
            initialDelaySeconds: 1
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 3
          {{- if $cfg.resources }}
          resources: {{ toYaml $cfg.resources | nindent 12 }}
          {{- else }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          {{- end }}
          volumeMounts:
            - name: control-plane-ca
              mountPath: /var/run/secrets/kuma.io/cp-ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: control-plane-ca
          secret:
            secretName: {{ include "kuma.controlPlane.tls.general.caSecretName" $ }}
            items:
              - key: ca.crt
                path: ca.crt
        - name: tmp
          emptyDir: {}
{{- end }}


name: Run E2E
description: |
  Build and run E2E tests for a specific configuration.
  Required env vars from caller: DOCKERHUB_PULL_CREDENTIAL (optional, for Docker Hub rate limit avoidance)
inputs:
  k8s_version:
    required: true
  cni_network_plugin:
    required: true
  arch:
    required: true
  target:
    required: false
    default: ""
  parallel_runner_id:
    required: true
  shards:
    required: false
    default: "1"
runs:
  using: composite
  steps:
    - name: "Free up disk space for the Runner"
      uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
    - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        # TODO: drop once https://github.com/jdx/mise/discussions/9889 is fixed (mise v2026.5.8 broke cosign public-key bundle verification).
        version: 2026.5.7
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MISE_DISABLE_TOOLS: "golangci-lint,skaffold,aqua:stackrox/kube-linter"
    - run: make build
      shell: bash
    - run: make -j build/distributions
      shell: bash
    - uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        max_attempts: 3
        retry_wait_seconds: 15s
        timeout_minutes: 30
        command: make -j images && make -j docker/save
    - run: make dev/set-kuma-helm-repo
      shell: bash
    - name: "Enable ipv6 for docker"
      if: ${{ inputs.k8s_version == 'kindIpv6' }}
      shell: bash
      run: |
        cat <<'EOF' | sudo tee /etc/docker/daemon.json
        {
          "ipv6": true,
          "fixed-cidr-v6": "2001:db8:1::/64",
          "dns-search": ["."]
        }
        EOF
        sudo service docker restart
    # Cache third-party images the e2e framework preloads (spire, cnpg, coredns, ...)
    # so runs don't depend on external registries (cgr.dev/ghcr.io) being reachable.
    - name: "Restore cached e2e images"
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ runner.temp }}/e2e-image-cache
        key: e2e-images-${{ inputs.target }}-${{ inputs.arch }}-${{ inputs.k8s_version }}-${{ inputs.shards }}-${{ inputs.parallel_runner_id }}-${{ hashFiles('test/e2e/**/*.go', 'test/e2e_env/**/*.go', 'test/framework/deployments/**') }}
    - name: "Load cached e2e images into docker"
      shell: bash
      run: |
        tar="${{ runner.temp }}/e2e-image-cache/images.tar"
        echo "KUMA_E2E_TRUST_CACHED_IMAGE_TAGS=false" >> "$GITHUB_ENV"
        if [[ -f "$tar" ]]; then
          docker load -i "$tar"
          echo "KUMA_E2E_TRUST_CACHED_IMAGE_TAGS=true" >> "$GITHUB_ENV"
        fi
    # Cache released kuma-dp tarballs pulled from packages.konghq.com by the DP
    # compatibility tests (universal target only). Without this every run re-pulls
    # ~130MB per supported version, which dominates Cloudsmith egress. The test
    # framework reads/writes this dir (see dpBinaryCacheHostDir). restore-keys lets
    # a version bump reuse the previous cache and only download the new version.
    - name: "Cache kuma-dp release binaries"
      if: ${{ inputs.target == 'universal' }}
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: /tmp/kuma-dp-binaries-cache
        key: kuma-dp-binaries-${{ inputs.arch }}-${{ hashFiles('versions.yml') }}
        restore-keys: |
          kuma-dp-binaries-${{ inputs.arch }}-
    - name: "Run E2E tests"
      shell: bash
      env:
        KUMA_DEBUG: ${{ runner.debug == '1' }}
        KUMA_E2E_PRELOAD_MANIFEST: ${{ runner.temp }}/e2e-preloaded-images.txt
        E2E_K8S_VERSION: ${{ inputs.k8s_version }}
        E2E_CNI_NETWORK_PLUGIN: ${{ inputs.cni_network_plugin }}
        E2E_ARCH: ${{ inputs.arch }}
        E2E_TARGET: ${{ inputs.target }}
        E2E_PARALLEL_RUNNER_ID: ${{ inputs.parallel_runner_id }}
        E2E_SHARDS: ${{ inputs.shards }}
      run: |
        if [[ "$E2E_K8S_VERSION" == "kindIpv6" ]]; then
          export IPV6=true
          export K8S_CLUSTER_TOOL=kind
          export KUMA_DEFAULT_RETRIES=60
          export KUMA_DEFAULT_TIMEOUT="6s"
        fi
        if [[ "$E2E_K8S_VERSION" != "kind"* ]]; then
          export K3S_VERSION="$E2E_K8S_VERSION"
          export K3D_CNI="$E2E_CNI_NETWORK_PLUGIN"
        fi
        if [[ "$E2E_ARCH" == "arm64" ]]; then
          export MAKE_PARAMETERS="-j1"
        else
          export MAKE_PARAMETERS="-j2"
        fi

        if [[ "$E2E_TARGET" == "" ]]; then
          export GINKGO_E2E_LABEL_FILTERS="job-$E2E_PARALLEL_RUNNER_ID"
        elif [[ "$E2E_TARGET" != "" && "${E2E_SHARDS:-1}" != "1" ]]; then
          ./.github/workflows/scripts/validate-e2e-shards.sh "$E2E_TARGET" "$E2E_SHARDS"
          export GINKGO_E2E_LABEL_FILTERS="job-$E2E_PARALLEL_RUNNER_ID"
        fi
        env
        if [[ "$E2E_TARGET" == "multizone" ]]; then
          export KUMA_DEFAULT_RETRIES=60
          export KUMA_DEFAULT_TIMEOUT="6s"
        fi

        # Keep imported node image layers hot in the page cache so the concurrent pod-startup wave doesn't stall on cold binary page-in (kumahq/kuma#17426).
        ./.github/workflows/scripts/e2e-prewarm-layers.sh &
        PREWARM_PID=$!

        function on_exit()
        {
          kill "${PREWARM_PID}" 2>/dev/null || true
          docker logout docker.io 2>/dev/null || true
        }
        trap "on_exit" EXIT

        # we pull a few images during the E2E run, sometimes we get rate-limited by docker hub
        # to prevent this, we support specifying a pull credential here
        if [[ "$DOCKERHUB_PULL_CREDENTIAL" != "" ]]; then
          DOCKER_USER=$(echo "$DOCKERHUB_PULL_CREDENTIAL" | cut -d ':' -f 1)
          DOCKER_PWD=$(echo "$DOCKERHUB_PULL_CREDENTIAL" | cut -d ':' -f 2)
          echo -n "$DOCKER_PWD" | docker login -u "$DOCKER_USER" --password-stdin
        fi

        if [[ "$E2E_TARGET" != "" ]]; then
          target="test/e2e-$E2E_TARGET"
        else
          target="test/e2e"
        fi
        make ${MAKE_PARAMETERS} CI=true "${target}"
    - name: "Save preloaded e2e images for caching"
      if: always()
      shell: bash
      run: |
        manifest="${{ runner.temp }}/e2e-preloaded-images.txt"
        dir="${{ runner.temp }}/e2e-image-cache"
        mkdir -p "$dir"
        if [[ ! -s "$manifest" ]]; then
          exit 0
        fi
        present=()
        while IFS= read -r img; do
          if docker image inspect "$img" >/dev/null 2>&1; then
            present+=("$img")
          fi
        done < <(sort -u "$manifest")
        if [[ ${#present[@]} -gt 0 ]]; then
          docker save "${present[@]}" -o "$dir/images.tar"
        fi
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: e2e-debug-${{ inputs.target }}-${{ inputs.arch }}-${{ inputs.k8s_version }}-${{ inputs.cni_network_plugin }}-${{ inputs.parallel_runner_id }}
        if-no-files-found: ignore
        path: |
          build/reports/e2e-debug*
        retention-days: ${{ github.event_name == 'pull_request' && 5 || 10 }}
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: e2e-reports-${{ inputs.target }}-${{ inputs.arch }}-${{ inputs.k8s_version }}-${{ inputs.cni_network_plugin }}-${{ inputs.parallel_runner_id }}
        if-no-files-found: ignore
        path: |
          build/reports
          !build/reports/e2e-debug*
        retention-days: ${{ github.event_name == 'pull_request' && 5 || 10 }}

name: project-lifecycle
on:
  schedule:
    - cron: 0 7 * * *
  workflow_dispatch:
  issues:
    types:
      - reopened
      - opened
      - labeled
permissions:
  contents: read
jobs:
  lifecycle:
    permissions:
      issues: write
    uses: kumahq/.github/.github/workflows/wfc_lifecycle.yml@30a74b03d52864bf0e211a6d43f4bb8deb6605ef
    with:
      filesToIgnore: CONTRIBUTING.md
    secrets:
      app_id: ${{ secrets.APP_ID }}
      private_key: ${{ secrets.APP_PRIVATE_KEY }}

name: "Test Transparent Proxy"
on:
  workflow_dispatch:
  schedule:
    - cron: 0 2 * * *
env:
  CI_TOOLS_DIR: "/home/runner/work/kuma/kuma/.ci_tools"
  IPV6: "true"
  MISE_DISABLE_TOOLS: "golangci-lint,skaffold"
permissions:
  contents: read
jobs:
  test:
    timeout-minutes: 60
    runs-on: ${{ vars.RUNS_ON_MASTER_AMD64 || vars.RUNS_ON_AMD64 || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          # TODO: drop once https://github.com/jdx/mise/discussions/9889 is fixed (mise v2026.5.8 broke cosign public-key bundle verification).
          version: 2026.5.7
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: "Enable IPv6 for Docker and enable necessary kernel modules for ip6tables"
        run: |
          cat <<'EOF' | sudo tee /etc/docker/daemon.json
          {
            "ipv6": true,
            "fixed-cidr-v6": "2001:db8:1::/64",
            "dns": ["8.8.8.8"],
            "dns-search": ["."]
          }
          EOF
          sudo service docker restart
          sudo modprobe ip6table_nat
          sudo modprobe ip6table_raw
      - run: |
          make test/transparentproxy

on:
  workflow_call:
    inputs:
      FULL_MATRIX:
        required: true
        type: string
      RUNNERS_BY_ARCH:
        required: true
        type: string
permissions:
  contents: read
env:
  CI_TOOLS_DIR: "/home/runner/work/kuma/kuma/.ci_tools"
  # This is automatically managed by CI
  K8S_MIN_VERSION: v1.31.12-k3s1
  K8S_MAX_VERSION: v1.34.1-k3s1
  MISE_DISABLE_TOOLS: "golangci-lint,skaffold"
jobs:
  test_unit:
    timeout-minutes: 25
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'ci/skip-test') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: |
          make test
  gen_e2e_matrix:
    timeout-minutes: 2
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - id: generate-matrix
        name: Generate matrix
        env:
          BASE_MATRIX: |-
            {
              "test_e2e": {
                "target": [""],
                "k8sVersion": ["${{ env.K8S_MAX_VERSION }}"],
                "arch": ["amd64"],
                "parallelism": [4],
                "cniNetworkPlugin": ["flannel"],
                "sidecarContainers": [""]
              },
              "test_e2e_env": {
                "target": ["kubernetes", "universal", "multizone"],
                "k8sVersion": ["kind", "kindIpv6", "${{ env.K8S_MAX_VERSION }}"],
                "arch": ["amd64"],
                "parallelism": [1],
                "cniNetworkPlugin": ["flannel"],
                "sidecarContainers": [""],
                "exclude":[
                  {"target": "kubernetes", "k8sVersion":"kind"},
                  {"target": "multizone", "k8sVersion":"kind"},
                  {"target":"universal", "k8sVersion":"${{ env.K8S_MAX_VERSION }}"}
                ],
                "include":[
                  {"sidecarContainers": "sidecarContainers", "k8sVersion": "${{ env.K8S_MAX_VERSION }}", "target": "kubernetes", "arch": "amd64"},
                  {"k8sVersion": "${{ env.K8S_MIN_VERSION }}", "target": "multizone", "arch": "amd64"},
                  {"k8sVersion": "${{ env.K8S_MIN_VERSION }}", "target": "kubernetes", "arch": "amd64"},
                  {"k8sVersion": "kind", "target": "universal", "arch": "arm64"},
                  {"k8sVersion": "${{ env.K8S_MAX_VERSION }}", "target": "gatewayapi", "arch": "amd64"},
                  {"cniNetworkPlugin": "calico", "k8sVersion": "${{ env.K8S_MAX_VERSION }}", "target": "multizone", "arch": "amd64"}
                ]
              }
            }
          # You can modify the include to run one of test suites on PRs (though you'd need to then remove it)
          OVERRIDE_JQ_CMD: |-
            .test_e2e = false
            | .test_e2e_env.include = []
            | .test_e2e_env.exclude += [{"arch": "arm64"}, {"k8sVersion": "kindIpv6"}, {"k8sVersion": "${{ env.K8S_MIN_VERSION}}"}]
          FULL_MATRIX: ${{ inputs.FULL_MATRIX }}
          SKIP_E2E_TESTS: ${{ contains(github.event.pull_request.labels.*.name, 'ci/skip-e2e-test') || contains(github.event.pull_request.labels.*.name, 'ci/skip-test') }}
        run: |-
          BASE_MATRIX_ALL="$BASE_MATRIX"
          if [[ "$FULL_MATRIX" != "true" ]]; then
            BASE_MATRIX_ALL=$(echo "$BASE_MATRIX_ALL" | jq -r "$OVERRIDE_JQ_CMD")
          fi
          # Skip e2e tests if the PR has the label "ci/skip-e2e-test" or "ci/skip-test"
          if [[ "$SKIP_E2E_TESTS" == "true" ]]; then
            BASE_MATRIX_ALL='{}'
          fi

          # Expand parallelRunnerId into the matrix based on each suite's parallelism
          BASE_MATRIX_ALL=$(echo "$BASE_MATRIX_ALL" | jq '
            if .test_e2e then .test_e2e.parallelRunnerId = [range(.test_e2e.parallelism[0])] else . end |
            if .test_e2e_env then .test_e2e_env.parallelRunnerId = [range(.test_e2e_env.parallelism[0])] else . end
          ')

          echo "final matrix: $BASE_MATRIX_ALL"
          {
            echo "matrix<<EOF"
            echo "$BASE_MATRIX_ALL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  test_e2e:
    needs: ["gen_e2e_matrix"]
    name: "e2e (default, ${{ matrix.k8sVersion }}, ${{ matrix.arch }}) / ${{ matrix.parallelRunnerId }}"
    if: fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e
    timeout-minutes: 60
    runs-on: ${{ fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch] }}
    strategy:
      max-parallel: 5
      matrix: ${{ fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e }}
      fail-fast: false
    env:
      CI_TOOLS_DIR: ${{ contains(fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch], '-kong') && '/work/kuma/kuma/.ci_tools' || '/home/runner/work/kuma/kuma/.ci_tools' }}
      MISE_DISABLE_TOOLS: "golangci-lint,skaffold"
      DOCKERHUB_PULL_CREDENTIAL: ${{ secrets.DOCKERHUB_PULL_CREDENTIAL }}
      KUMA_DEBUG: ${{ runner.debug == '1' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/run-e2e
        with:
          k8s_version: ${{ matrix.k8sVersion }}
          cni_network_plugin: ${{ matrix.cniNetworkPlugin }}
          arch: ${{ matrix.arch }}
          sidecar_containers: ${{ matrix.sidecarContainers }}
          target: ${{ matrix.target }}
          parallel_runner_id: ${{ matrix.parallelRunnerId }}
  test_e2e_env:
    needs: ["gen_e2e_matrix"]
    name: "e2e (${{ matrix.target }}, ${{ matrix.k8sVersion }}, ${{ matrix.arch }}${{ matrix.cniNetworkPlugin != 'flannel' && format(', {0}', matrix.cniNetworkPlugin) || '' }}${{ matrix.sidecarContainers != '' && ', sidecar' || '' }}) / ${{ matrix.parallelRunnerId }}"
    if: fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e_env
    timeout-minutes: 60
    runs-on: ${{ fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch] }}
    strategy:
      max-parallel: 5
      matrix: ${{ fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e_env }}
      fail-fast: false
    env:
      CI_TOOLS_DIR: ${{ contains(fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch], '-kong') && '/work/kuma/kuma/.ci_tools' || '/home/runner/work/kuma/kuma/.ci_tools' }}
      MISE_DISABLE_TOOLS: "golangci-lint,skaffold"
      DOCKERHUB_PULL_CREDENTIAL: ${{ secrets.DOCKERHUB_PULL_CREDENTIAL }}
      KUMA_DEBUG: ${{ runner.debug == '1' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/run-e2e
        with:
          k8s_version: ${{ matrix.k8sVersion }}
          cni_network_plugin: ${{ matrix.cniNetworkPlugin }}
          arch: ${{ matrix.arch }}
          sidecar_containers: ${{ matrix.sidecarContainers }}
          target: ${{ matrix.target }}
          parallel_runner_id: ${{ matrix.parallelRunnerId }}

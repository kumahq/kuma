on:
  workflow_call:
    inputs:
      FULL_MATRIX:
        required: true
        type: string
      RUNNERS_BY_ARCH:
        required: true
        type: string
      IS_PULL_REQUEST:
        required: true
        type: boolean
      IS_RELEASE_TAG:
        required: true
        type: boolean
permissions:
  contents: read
env:
  CI_TOOLS_DIR: "/home/runner/work/kuma/kuma/.ci_tools"
  # This is automatically managed by CI
  K8S_MIN_VERSION: v1.34.9-k3s1
  K8S_MAX_VERSION: v1.35.3-k3s1
  MISE_DISABLE_TOOLS: "golangci-lint,skaffold,aqua:stackrox/kube-linter"
jobs:
  test_unit:
    timeout-minutes: 30
    if: ${{ !(contains(github.event.pull_request.labels.*.name, 'ci/skip-test') || inputs.IS_RELEASE_TAG) }}
    runs-on: ${{ vars.RUNS_ON_MASTER_AMD64 || vars.RUNS_ON_AMD64 || 'ubuntu-24.04' }}
    env:
      UNIT_CLEAN_TESTCACHE: ${{ inputs.IS_PULL_REQUEST && 'false' || 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # TODO: drop once https://github.com/jdx/mise/discussions/9889 is fixed (mise v2026.5.8 broke cosign public-key bundle verification).
          version: 2026.5.7
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Cache Go build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-test-race-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-test-race-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-test-race-${{ runner.os }}-
      - run: |
          make test
  gen_e2e_matrix:
    timeout-minutes: 2
    runs-on: ${{ vars.RUNS_ON_MASTER_AMD64 || vars.RUNS_ON_AMD64 || 'ubuntu-24.04' }}
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - id: generate-matrix
        name: Generate matrix
        env:
          BASE_MATRIX: |-
            {
              "test_e2e": {
                "target": [""],
                "k8sVersion": ["${{ env.K8S_MAX_VERSION }}"],
                "arch": ["amd64"],
                "parallelism": [4],
                "cniNetworkPlugin": ["flannel"]
              },
              "test_e2e_env": {
                "target": ["kubernetes", "universal", "multizone"],
                "k8sVersion": ["kind", "kindIpv6", "${{ env.K8S_MAX_VERSION }}"],
                "arch": ["amd64"],
                "parallelism": [1],
                "cniNetworkPlugin": ["flannel"],
                "exclude":[
                  {"target": "kubernetes", "k8sVersion":"kind"},
                  {"target": "multizone", "k8sVersion":"kind"},
                  {"target":"universal", "k8sVersion":"${{ env.K8S_MAX_VERSION }}"}
                ],
                "include":[
                  {"k8sVersion": "${{ env.K8S_MIN_VERSION }}", "target": "multizone", "arch": "amd64"},
                  {"k8sVersion": "${{ env.K8S_MIN_VERSION }}", "target": "kubernetes", "arch": "amd64"},
                  {"k8sVersion": "kind", "target": "universal", "arch": "arm64"},
                  {"cniNetworkPlugin": "calico", "k8sVersion": "${{ env.K8S_MAX_VERSION }}", "target": "multizone", "arch": "amd64"}
                ]
              }
            }
          # You can modify the include to run one of test suites on PRs (though you'd need to then remove it)
          OVERRIDE_JQ_CMD: |-
            .test_e2e = false
            | .test_e2e_env.include = []
            | .test_e2e_env.parallelism = [4]
            | .test_e2e_env.exclude += [{"arch": "arm64"}, {"k8sVersion": "kindIpv6"}, {"k8sVersion": "${{ env.K8S_MIN_VERSION}}"}]
          FULL_MATRIX: ${{ inputs.FULL_MATRIX }}
          SKIP_E2E_TESTS: ${{ contains(github.event.pull_request.labels.*.name, 'ci/skip-e2e-test') || contains(github.event.pull_request.labels.*.name, 'ci/skip-test') || inputs.IS_RELEASE_TAG }}
        run: |-
          BASE_MATRIX_ALL="$BASE_MATRIX"
          if [[ "$FULL_MATRIX" != "true" ]]; then
            BASE_MATRIX_ALL=$(echo "$BASE_MATRIX_ALL" | jq -r "$OVERRIDE_JQ_CMD")
          fi
          # Skip e2e tests if the PR has the label "ci/skip-e2e-test" or "ci/skip-test"
          if [[ "$SKIP_E2E_TESTS" == "true" ]]; then
            BASE_MATRIX_ALL='{}'
          fi

          # Expand parallelRunnerId into the matrix based on each suite's parallelism, then remove parallelism
          BASE_MATRIX_ALL=$(echo "$BASE_MATRIX_ALL" | jq '
            if .test_e2e and (.test_e2e | type == "object") then .test_e2e.parallelRunnerId = [range(.test_e2e.parallelism[0] // 1)] | del(.test_e2e.parallelism) else . end |
            if .test_e2e_env and (.test_e2e_env | type == "object") then .test_e2e_env.shards = [.test_e2e_env.parallelism[0] // 1] | .test_e2e_env.parallelRunnerId = [range(.test_e2e_env.parallelism[0] // 1)] | del(.test_e2e_env.parallelism) else . end
          ')

          echo "final matrix: $BASE_MATRIX_ALL"
          {
            echo "matrix<<EOF"
            echo "$BASE_MATRIX_ALL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  test_e2e:
    needs: ["gen_e2e_matrix"]
    name: "e2e (default, ${{ matrix.k8sVersion }}, ${{ matrix.arch }})"
    if: fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e
    timeout-minutes: 60
    runs-on: ${{ fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch] }}
    strategy:
      max-parallel: ${{ github.event_name == 'pull_request' && 12 || 5 }}
      matrix: ${{ fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e }}
      fail-fast: false
    env:
      CI_TOOLS_DIR: ${{ contains(fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch], '-kong') && '/work/kuma/kuma/.ci_tools' || '/home/runner/work/kuma/kuma/.ci_tools' }}
      MISE_DISABLE_TOOLS: "golangci-lint,skaffold,aqua:stackrox/kube-linter"
      DOCKERHUB_PULL_CREDENTIAL: ${{ secrets.DOCKERHUB_PULL_CREDENTIAL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/run-e2e
        with:
          k8s_version: ${{ matrix.k8sVersion }}
          cni_network_plugin: ${{ matrix.cniNetworkPlugin }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          parallel_runner_id: ${{ matrix.parallelRunnerId }}
          shards: ${{ matrix.shards }}
  test_e2e_env:
    needs: ["gen_e2e_matrix"]
    name: "e2e (${{ matrix.target }}, ${{ matrix.k8sVersion }}, ${{ matrix.arch }}${{ matrix.cniNetworkPlugin != 'flannel' && format(', {0}', matrix.cniNetworkPlugin) || '' }})"
    if: fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e_env
    timeout-minutes: 60
    runs-on: ${{ fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch] }}
    strategy:
      max-parallel: ${{ github.event_name == 'pull_request' && 12 || 5 }}
      matrix: ${{ fromJSON(needs.gen_e2e_matrix.outputs.matrix).test_e2e_env }}
      fail-fast: false
    env:
      CI_TOOLS_DIR: ${{ contains(fromJSON(inputs.RUNNERS_BY_ARCH)[matrix.arch], '-kong') && '/work/kuma/kuma/.ci_tools' || '/home/runner/work/kuma/kuma/.ci_tools' }}
      MISE_DISABLE_TOOLS: "golangci-lint,skaffold,aqua:stackrox/kube-linter"
      DOCKERHUB_PULL_CREDENTIAL: ${{ secrets.DOCKERHUB_PULL_CREDENTIAL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/run-e2e
        with:
          k8s_version: ${{ matrix.k8sVersion }}
          cni_network_plugin: ${{ matrix.cniNetworkPlugin }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          parallel_runner_id: ${{ matrix.parallelRunnerId }}
          shards: ${{ matrix.shards }}

name: pull request comment
on:
  issue_comment:
    types: [created]
env:
  GH_USER: "github-actions[bot]"
  GH_EMAIL: "<41898282+github-actions[bot]@users.noreply.github.com>"
  MISE_DISABLE_TOOLS: "golangci-lint,skaffold"
permissions:
  contents: read
jobs:
  pr_comments:
    timeout-minutes: 120
    if: github.event.issue.pull_request != '' && (contains(github.event.comment.body, '/format') || (contains(github.event.comment.body, '/golden_files') && !contains(github.event.comment.body, '/golden_files_e2e')) || contains(github.event.comment.body, '/golden_files_e2e') || contains(github.event.comment.body, '/tproxy_golden_files'))
    runs-on: ubuntu-24.04
    env:
      IPV6: "true"
    steps:
      - name: Generate GitHub app token
        id: github-app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: check-maintainer
        run: |
          # Ensure the commenter is a maintainer
          if gh api '/repos/${{ github.repository }}/collaborators?permission=maintain' --paginate --jq '.[].login' | grep -q ${{ github.event.comment.user.login }}; then
            gh api --method POST -f content='+1' ${{ github.event.comment.url }}/reactions
          else
            gh api --method POST -f content='-1' ${{ github.event.comment.url }}/reactions
            echo "${{ github.event.comment.user.login }} is not a maintainer of the repo, can't run this action"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ steps.github-app-token.outputs.token }}
      - id: get-branch
        run: |
          echo "BRANCH_NAME=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName --jq '.headRefName')" >> "$GITHUB_ENV"
          echo "REPO=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRepository,headRepositoryOwner --jq '[.headRepositoryOwner.login,.headRepository.name] | join("/")')" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ steps.github-app-token.outputs.token }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          repository: ${{ env.REPO }}
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ steps.github-app-token.outputs.token }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
      # Automatically update code formatting if /format is in the comment
      - name: "Auto-format code"
        if: contains(github.event.comment.body, '/format')
        run: make clean/generated check
        continue-on-error: true

      # Update unit-test golden files if /golden_files is in the comment
      - name: "Update golden files (excluding transparent proxy and e2e)"
        if: contains(github.event.comment.body, '/golden_files') && !contains(github.event.comment.body, '/golden_files_e2e')
        run: make test UPDATE_GOLDEN_FILES=true

      - name: "Free up disk space for E2E golden files"
        if: contains(github.event.comment.body, '/golden_files_e2e')
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true

      # Update only the e2e suites that generate golden files if /golden_files_e2e is in the comment
      - name: "Update e2e golden files"
        if: contains(github.event.comment.body, '/golden_files_e2e')
        env:
          DOCKERHUB_PULL_CREDENTIAL: ${{ secrets.DOCKERHUB_PULL_CREDENTIAL }}
        run: |
          did_login=false

          on_exit() {
            if [[ "$did_login" == "true" ]]; then
              docker logout docker.io
            fi
          }

          if [[ "$DOCKERHUB_PULL_CREDENTIAL" != "" ]]; then
            DOCKER_USER=$(echo "$DOCKERHUB_PULL_CREDENTIAL" | cut -d ':' -f 1)
            DOCKER_PWD=$(echo "$DOCKERHUB_PULL_CREDENTIAL" | cut -d ':' -f 2)
            echo -n "$DOCKER_PWD" | docker login -u "$DOCKER_USER" --password-stdin
            did_login=true
            trap on_exit EXIT
          fi

          make dev/set-kuma-helm-repo
          make -j images && make -j docker/save
          make CI=true UPDATE_GOLDEN_FILES=true GINKGO_E2E_TEST_FLAGS=--focus=Envoy.+Config test/e2e-universal
          KUMA_DEFAULT_RETRIES=60 KUMA_DEFAULT_TIMEOUT=6s \
            make CI=true UPDATE_GOLDEN_FILES=true GINKGO_E2E_TEST_FLAGS=--focus=Resource.+Label.+Validation test/e2e-multizone

      # Enable IPv6 for transparent proxy tests
      - name: "Enable IPv6 for Docker and enable necessary kernel modules for ip6tables"
        if: contains(github.event.comment.body, '/tproxy_golden_files')
        run: |
          cat <<'EOF' | sudo tee /etc/docker/daemon.json
          {
            "ipv6": true,
            "fixed-cidr-v6": "2001:db8:1::/64",
            "dns": ["8.8.8.8"],
            "dns-search": ["."]
          }
          EOF
          sudo service docker restart
          sudo modprobe ip6table_nat
          sudo modprobe ip6table_raw

      # Update only transparent proxy golden files if /tproxy_golden_files is in the comment
      - name: "Update transparent proxy golden files"
        if: contains(github.event.comment.body, '/tproxy_golden_files')
        run: make test/transparentproxy UPDATE_GOLDEN_FILES=true

      - name: commit and push fixes
        env:
          GITHUB_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          if git diff --exit-code --stat; then
            echo "No change detected, skipping git push"
          else
            git config user.name "${GH_USER}"
            git config user.email "${GH_EMAIL}"
            git commit -s -m "ci(pr-comments): apply requested updates" .
            git push
          fi
      - run: gh api --method POST -f content='hooray' ${{ github.event.comment.url }}/reactions
        env:
          GITHUB_TOKEN: ${{ steps.github-app-token.outputs.token }}

meshes:
  - name: mesh-1
    ingress:
      enabled: true
      replicas: 1
      image:
        registry: registry.k8s.io
        repository: pause
        tag: "3.10"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 64Mi
      containerResources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 64Mi
      podSpec:
        containerSecurityContext:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

type: MeshOpenTelemetryBackend
name: mt-otel-backend
mesh: envoyconfig-zoneproxies
labels:
  kuma.io/display-name: mt-otel-backend
spec:
  endpoint:
    address: otel-collector.observability
    port: 4317
---
type: MeshTrace
name: mt-otel
mesh: envoyconfig-zoneproxies
labels:
  kuma.io/effect: shadow
spec:
  default:
    backends:
      - type: OpenTelemetry
        openTelemetry:
          backendRef:
            kind: MeshOpenTelemetryBackend
            labels:
              kuma.io/display-name: mt-otel-backend
    sampling:
      overall: 100

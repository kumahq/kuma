apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: mt-display-name
  namespace: {{ .KumaNamespace }}
  annotations:
    kuma.io/display-name: my-custom-name
  labels:
    kuma.io/mesh: multizone-label-validation
    kuma.io/origin: zone
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s

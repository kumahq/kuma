apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: mt-env
  namespace: default
  labels:
    kuma.io/mesh: multizone-label-validation
    kuma.io/origin: zone
    kuma.io/env: universal
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s

apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: mt-service-account
  namespace: default
  labels:
    kuma.io/mesh: multizone-label-validation
    k8s.kuma.io/service-account: default
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s

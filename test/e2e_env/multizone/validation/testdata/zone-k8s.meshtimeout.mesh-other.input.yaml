apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: mt-mesh-other
  namespace: {{ .KumaNamespace }}
  labels:
    kuma.io/mesh: nonexistent-mesh
    kuma.io/origin: zone
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s

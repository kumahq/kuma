apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: mt-kube-namespace
  namespace: default
  labels:
    kuma.io/mesh: multizone-label-validation
    k8s.kuma.io/namespace: kuma-system
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s

apiVersion: kuma.io/v1alpha1
kind: MeshService
metadata:
  name: ms-service-account
  namespace: default
  labels:
    kuma.io/mesh: multizone-label-validation
    k8s.kuma.io/service-account: default
spec:
  ports:
    - port: 80
      appProtocol: http
  selector:
    dataplaneTags:
      kuma.io/service: my-service

apiVersion: kuma.io/v1alpha1
kind: MeshTimeout
metadata:
  name: mt-origin-global
  namespace: default
  labels:
    kuma.io/mesh: multizone-label-validation
    kuma.io/origin: global
spec:
  targetRef:
    kind: Mesh
  to:
    - targetRef:
        kind: Mesh
      default:
        connectionTimeout: 5s

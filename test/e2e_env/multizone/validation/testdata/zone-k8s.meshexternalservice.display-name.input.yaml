  namespace: kuma-system
  labels:
    kuma.io/mesh: multizone-label-validation
    kuma.io/origin: zone
    kuma.io/display-name: my-custom-name
spec:
  match:
    type: HostnameGenerator
    port: 80
    protocol: http
